name: task_answer_question
description: Human answers a pending question on a task. Moves task back to analysing for continued analysis.
inputSchema:
  type: object
  properties:
    task_id:
      type: string
      description: "The unique identifier of the task"
    answer:
      type: string
      description: "The user's response. Interpretation depends on `type`: option key (A-E) or custom text for singleChoice; reviewer text for freeText; 'approved' or 'rejected' for approval. Required for all non-priorityRanking types."
    type:
      type: string
      enum: [singleChoice, approval, freeText, priorityRanking]
      description: "Question type. Determines which fields are required/validated. Should match the type stamped on the pending question by task_mark_needs_input."
    comment:
      type: string
      description: "Required when answer='rejected' on an approval question."
    ranked_items:
      type: array
      description: "Required for priorityRanking. Ordered list of item identifiers."
      items:
        type: string
    question_id:
      type: string
      description: "Optional: the ID of the specific question to answer when task has pending_questions batch (e.g. 'q1'). Defaults to the first pending question."
    attachments:
      type: array
      description: "Optional file attachments with metadata stored on disk: { name, size, path }"
      items:
        type: object
        properties:
          name:
            type: string
          size:
            type: integer
          path:
            type: string
  required:
    - task_id
